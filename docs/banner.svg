<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#1a1a1d"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EEAD4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#5EEAD4" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- gate / channel motif, right side -->
  <g transform="translate(900,40)" stroke="#9a968d" stroke-width="2" fill="none" opacity="0.85">
    <rect x="0" y="0" width="220" height="160" rx="4"/>
    <line x1="40" y1="0" x2="40" y2="160"/>
    <line x1="90" y1="0" x2="90" y2="160"/>
    <line x1="140" y1="0" x2="140" y2="160"/>
    <line x1="190" y1="0" x2="190" y2="160"/>
    <rect x="40" y="60" width="50" height="100" fill="url(#flow)" stroke="none"/>
  </g>
  <g stroke="#5EEAD4" stroke-width="2.5" fill="none" opacity="0.8">
    <path d="M900 120 L 760 120" />
    <path d="M790 110 L 760 120 L 790 130" fill="none"/>
  </g>

  <text x="60" y="170" font-family="Georgia, 'Playfair Display', serif" font-size="76" fill="#f4f3f1" letter-spacing="2">Sluice</text>
  <text x="62" y="205" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#9a968d" letter-spacing="0.5">A validated Claude node + workflows for n8n</text>

  <text x="62" y="250" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#6b6b6f" letter-spacing="1.5">DUST AI LABS</text>
</svg>
